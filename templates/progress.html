<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Session Progress | Digital Twin AI</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #3498db;
            --bg: #f5f7fa;
            --card: #ffffff;
            --text: #2c3e50;
            --danger: #e74c3c;
            --success: #2ecc71;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
        }

        h2 { margin: 0; color: var(--text); }

        .back-btn {
            text-decoration: none;
            color: var(--primary);
            font-weight: 600;
            transition: 0.3s;
        }

        .back-btn:hover { color: #2980b9; }

        .chart-wrapper {
            position: relative;
            height: 400px;
            width: 100%;
        }

        .legend-info {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            font-size: 0.9rem;
            color: #666;
        }

        .dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h2>Mental Health Journey</h2>
            <a href="/" class="back-btn">← Back to Dashboard</a>
        </header>

        <div id="progress-data"
             data-scores='{{ scores | tojson }}'
             data-times='{{ times | tojson }}'>
        </div>

        <div class="chart-wrapper">
            <canvas id="progressChart"></canvas>
        </div>

        
    </div>

    <script>
        const dataElement = document.getElementById("progress-data");
        const scores = JSON.parse(dataElement.dataset.scores);
        const times = JSON.parse(dataElement.dataset.times);

        const ctx = document.getElementById("progressChart").getContext("2d");

        // Create gradient for the line
        const gradient = ctx.createLinearGradient(0, 0, 0, 400);
        gradient.addColorStop(0, 'rgba(46, 204, 113, 0.2)'); // Green at top
        gradient.addColorStop(1, 'rgba(231, 76, 60, 0.2)');  // Red at bottom

        new Chart(ctx, {
            type: "line",
            data: {
                labels: times,
                datasets: [{
                    label: "Mood Stability Index",
                    data: scores,
                    borderColor: "#3498db",
                    backgroundColor: gradient,
                    fill: true,
                    borderWidth: 3,
                    pointBackgroundColor: "#fff",
                    pointBorderColor: "#3498db",
                    pointRadius: 5,
                    pointHoverRadius: 8,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        min: -1,
                        max: 1,
                        grid: {
                            color: function(context) {
                                if (context.tick.value === 0) return '#e74c3c'; // Red center line
                                return '#f0f0f0';
                            },
                            lineWidth: function(context) {
                                return context.tick.value === 0 ? 2 : 1;
                            }
                        },
                        title: {
                            display: true,
                            text: 'Mood Intensity (-1 to +1)'
                        }
                    },
                    x: {
                        grid: { display: false }
                    }
                },
                plugins: {
                    legend: { display: false }
                }
            }
        });
    </script>
</body>
</html>
